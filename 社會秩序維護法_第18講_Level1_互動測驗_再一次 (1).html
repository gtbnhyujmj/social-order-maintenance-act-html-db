ints": 1, "required": "TRUE", "explanation": "第18講指出§27自首須向警察機關自首並接受裁處。", "topic": "自首受理機關", "source": "Notion：社會秩序維護法 / 第18講 / 再一次"}, {"id": "SOMA18B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "甲向普通公務員陳述違序事實，依第18講，是否當然構成自首？", "option_a": "不當然，除非該員帶同至警察機關", "option_b": "當然構成", "option_c": "一律構成免罰", "option_d": "一律構成阻卻違法", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講指出向非警察機關陳述不構成自首，除非該員帶同至警察機關。", "topic": "向普通公務員陳述", "source": "Notion：社會秩序維護法 / 第18講 / 再一次"}, {"id": "SOMA18B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "依第18講，§27自首效果為何？", "option_a": "必減輕或免除其處罰", "option_b": "僅得作為犯後態度", "option_c": "完全沒有法律效果", "option_d": "必然加重處罰", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講指出自首效果為必減輕或免除其處罰。", "topic": "自首效果必減免", "source": "Notion：社會秩序維護法 / 第18講 / 再一次"}, {"id": "SOMA18B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "違序被發掘後才承認，依第18講稱為何者？", "option_a": "自白，不是§27自首", "option_b": "自首，必減免", "option_c": "緊急避難", "option_d": "無責任能力", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講補充指出被發掘後才承認僅屬自白，不能依§27減免。", "topic": "自白非自首", "source": "Notion：社會秩序維護法 / 第18講 / 再一次"}, {"id": "SOMA18B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "被發掘後才承認雖非自首，但依第18講可作為何者審酌？", "option_a": "§28犯後態度", "option_b": "§27必減免", "option_c": "§29必免除", "option_d": "§26累次違序排除", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講指出自白只能作為§28犯後態度的審酌。", "topic": "自白用途", "source": "Notion：社會秩序維護法 / 第18講 / 再一次"}, {"id": "SOMA18B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "依第18講，法律上得減免原因之年齡組合為何？", "option_a": "14至18歲、滿70歲", "option_b": "未滿14歲、心神喪失", "option_c": "滿20歲、滿30歲", "option_d": "滿65歲、滿80歲", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講列普通減免原因之年齡為14-18歲、滿70歲。", "topic": "法律上得減年齡", "source": "Notion：社會秩序維護法 / 第18講 / 再一次"}, {"id": "SOMA18B-L1-17", "level": "Level 1", "type": "multiple_c lanation": "第18講補充指出§28與§29是行政裁量權的具體化，處罰過重應以§28十項標準與比例原則論述。", "topic": "§28十項標準定位", "source": "Notion：社會秩序維護法 / 第18講 / 再一次"}, {"id": "SOMA18B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "依第18講，下列何者屬§28量罰因素？", "option_a": "動機、目的、手段、生活狀況、品行、智識程度、犯後態度等", "option_b": "公司股價、董事任期、股票面額", "option_c": "土地公告現值、繼承順位", "option_d": "契約標的物瑕疵擔保", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講列出量罰應審酌動機、目的、手段、生活狀況、品行、智識程度、與被害人關係、違反義務程度、危險/損害、犯後態度等。", "topic": "量罰因素例子", "source": "Notion：社會秩序維護法 / 第18講 / 再一次"}, {"id": "SOMA18B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "國考題出現警察處罰過重，依第18講最應引用何者？", "option_a": "§28十項標準及比例原則", "option_b": "只引用§1目的條款", "option_c": "只引用刑法累犯", "option_d": "只引用民法侵權行為", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講國考連結指出，若題目出現警察處罰過重，應引用§28十項標準及比例原則。", "topic": "過重處罰論述", "source": "Notion：社會秩序維護法 / 第18講 / 再一次"}, {"id": "SOMA18B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "§29免除處罰後，3個月內再犯是否可能構成§26累次違序？", "option_a": "可能，免除處罰仍屬裁處確定", "option_b": "不可能，免除後完全不存在", "option_c": "不可能，免除後永遠不得加重", "option_d": "不可能，除非同一條款", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講補充指出免除處罰仍屬裁處確定，若3個月內再犯仍可構成§26累次違序。", "topic": "免除仍確定", "source": "Notion：社會秩序維護法 / 第18講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
