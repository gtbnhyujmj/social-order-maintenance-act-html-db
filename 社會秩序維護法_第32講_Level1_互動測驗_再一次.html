<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>社會秩序維護法 第32講 Level 1｜再一次</title><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.6;margin:0;background:#f6f6f6;color:#222}.wrap{max-width:900px;margin:0 auto;padding:24px}.card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 3px 16px rgba(0,0,0,.08)}h1{font-size:1.55rem;margin-top:0}.meta{color:#666;margin-bottom:12px}.score{font-weight:700;margin:12px 0}.q{font-size:1.15rem;font-weight:700;margin:18px 0}button{border:1px solid #ddd;background:#fff;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:1rem}button:hover{background:#f1f1f1}.option{display:block;width:100%;text-align:left;margin:10px 0}.correct{border-color:#27865f;background:#e9fff4}.wrong{border-color:#b94a48;background:#fff0f0}.feedback{margin-top:16px;padding:14px;border-radius:10px;background:#f8f8f8}.nav{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}#answerList p{border-top:1px solid #eee;padding-top:8px}</style></head><body><div class="wrap"><div class="card"><h1>社會秩序維護法 第32講 Level 1｜再一次 25題</h1><div class="meta">第二套：偏§80/§81性交易與媒介分流、§82/§83善良風俗特別法競合、私密窺視與性騷擾、§84私人職業賭博補足刑法§266。重點包含專區、拘留簡易庭、妨害秘密罪、觸摸罪與私人空間職業賭博。</div><div class="score" id="score"></div><div class="meta" id="progress"></div><div class="q" id="question"></div><div id="options"></div><div id="feedback" class="feedback" style="display:none;"></div><div class="nav"><button onclick="prevQ()">上一題</button><button onclick="nextQ()">下一題</button><button onclick="restart()">重新開始</button><button onclick="showAnswers()">顯示/隱藏全部答案</button></div><div id="answerList" style="display:none;margin-top:20px;"></div></div></div><script>const questions=[{"id": "SOMA32B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "第32講再一次版若用實務分流陷阱濃縮，最核心是什麼？", "option_a": "§80/§81性交易與媒介、§82/§83善良風俗、§84私人職業賭博與刑法§266分流", "option_b": "§75毀損與報告義務", "option_c": "§74深夜遊蕩", "option_d": "§69交通與危險動物", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講主軸為性交易管理新制、妨害善良風俗禁止行為與非公共場所賭博。", "topic": "第32講再一次核心", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "第32講提到§80性交易管理新制，主要源於哪個憲法解釋背景？", "option_a": "釋字666號", "option_b": "釋字748號", "option_c": "釋字803號", "option_d": "釋字791號", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講以釋字666號說明罰娼也罰嫖之制度背景。", "topic": "釋字666制度背景", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "依第32講，性交易專區外之性交易如何處理？", "option_a": "性交易雙方均裁處罰鍰", "option_b": "只罰娼不罰嫖", "option_c": "只罰嫖不罰娼", "option_d": "完全不罰", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出除性交易專區內合法外，其餘區域之性交易雙方均裁處3萬元以下罰鍰。", "topic": "專區外雙方均罰", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "依第32講，§80性交易在何種情況下例外合法？", "option_a": "在性交易專區內", "option_b": "只要雙方同意", "option_c": "只要在住宅內", "option_d": "只要未收費", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出原則上除性交易專區內合法外，其餘區域均裁罰。", "topic": "專區內例外合法", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "依第32講，§80性交易雙方裁罰上限為何？", "option_a": "3萬元以下罰鍰", "option_b": "5萬元以下罰鍰", "option_c": "1萬元以下罰鍰", "option_d": "3日以下拘留", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出§80為3萬元以下罰鍰。", "topic": "§80罰鍰上限陷阱", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "依第32講，§80第一次裁罰基準大約落在哪個範圍？", "option_a": "1,500至6,000元", "option_b": "1萬至5萬元", "option_c": "固定3萬元", "option_d": "固定300元", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出警察機關依裁罰基準，第一次約1,500至6,000元自行裁處。", "topic": "第一次裁罰基準", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "地方政府設置性交易專區，依第32講可依何條制定自治條例？", "option_a": "§91-1", "option_b": "§80", "option_c": "§38", "option_d": "§7", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出地方政府得依§91-1制定自治條例設置專區。", "topic": "§91-1自治條例", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "第32講提到目前實務上仍可能營運的是何者？", "option_a": "少數合法公娼館", "option_b": "所有性交易專區", "option_c": "所有私人住宅性交易", "option_d": "所有媒介業者", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出目前僅少數合法公娼館仍可營運。", "topic": "公娼館現況", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "依第32講，§81媒介性交易常見對象為何？", "option_a": "皮條客、三七仔", "option_b": "性交易雙方本人", "option_c": "公共場所乞討者", "option_d": "私人賭客", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出§81對象為皮條客、三七仔。", "topic": "媒介性交易對象", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "依第32講，§81媒介性交易處罰為何？", "option_a": "3日以下拘留，並處1至5萬元罰鍰", "option_b": "3萬元以下罰鍰而已", "option_c": "只申誡", "option_d": "只民事賠償", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出§81處3日以下拘留，並處1至5萬元罰鍰。", "topic": "§81拘留罰鍰", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "§81因涉及拘留，依第32講程序上應如何？", "option_a": "警察機關移送簡易庭裁定", "option_b": "警察機關自行終局裁定", "option_c": "直接訴願", "option_d": "行政執行署裁定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出因涉及拘留，由警察機關移送簡易庭裁定。", "topic": "拘留程序分流", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "甲只是性交易一方；乙則介紹媒合收取利益。依第32講，下列何者正確？", "option_a": "甲偏§80，乙偏§81", "option_b": "甲乙都只適用§84", "option_c": "甲乙都只適用§82", "option_d": "甲偏§83，乙偏§75", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講§80處理性交易雙方，§81處理皮條客、三七仔等媒介性交易者。", "topic": "§80與§81分流", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "公共場所乞討叫化要成立§82Ⅰ①，依第32講尚須何者？", "option_a": "不聽勸阻", "option_b": "有媒介性交易", "option_c": "有針孔錄影", "option_d": "有職業賭場", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出§82Ⅰ①為公共場所乞討且不聽勸阻。", "topic": "公共乞討要件", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "§82Ⅰ①乞討叫化之規範目的，依第32講為何？", "option_a": "維護市容與預防滋擾", "option_b": "保護私人職業賭場", "option_c": "保護性交易媒介利益", "option_d": "保護偽造貨幣秩序", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出乞討叫化旨在維護市容與預防滋擾。", "topic": "乞討規範目的", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "公共場所表演早期牛肉場、脫衣舞等妨害風俗節目，依第32講屬何者？", "option_a": "§82Ⅰ②播放淫詞穢劇", "option_b": "§83①故意窺視", "option_c": "§84職業賭博", "option_d": "§81媒介性交易", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出§82Ⅰ②為公共場所表演妨害風俗之節目。", "topic": "淫詞穢劇場域", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "舞廳、夜總會等特定場所情節重大，依第32講得併處何者？", "option_a": "停業或勒令歇業", "option_b": "刑法死刑", "option_c": "永久剝奪身分證", "option_d": "只口頭勸導", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出特定場所情節重大者，得併處停業或勒令歇業。", "topic": "特定場所重大效果", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "窺視臥室、浴室、廁所、更衣室等私密空間，依第32講屬何者？", "option_a": "§83①故意窺視", "option_b": "§82Ⅰ①乞討", "option_c": "§80性交易", "option_d": "§84私人賭博", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出§83①為窺視臥室、浴室、廁所、更衣室等私密空間。", "topic": "私密空間窺視", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "若使用針孔攝影錄音錄影私密空間，依第32講可能升格觸犯何罪？", "option_a": "刑法妨害秘密罪§315-1", "option_b": "刑法毀損罪§354", "option_c": "刑法偽造貨幣罪§196", "option_d": "刑法賭博罪§266", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出若使用工具如針孔攝影錄音錄影，則觸犯刑法妨害秘密罪§315-1。", "topic": "針孔攝影升格", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "公共場所裸體或放蕩姿勢，且不聽勸阻，依第32講屬何者？", "option_a": "§83②任意裸體", "option_b": "§81媒介性交易", "option_c": "§84職業賭博", "option_d": "§82乞討叫化", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出§83②為公共場所裸體或放蕩姿勢，不聽勸阻。", "topic": "任意裸體構成", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "第32講用哪個俗稱幫助記憶§83②任意裸體？", "option_a": "露鳥俠", "option_b": "黃牛俠", "option_c": "強力膠俠", "option_d": "當舖俠", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出任意裸體常見案例為露鳥俠。", "topic": "露鳥俠記憶點", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "以猥褻言詞、舉動調戲異性，若符合性騷擾防治法§2定義，依第32講應如何？", "option_a": "優先適用性騷擾防治法等特別法", "option_b": "仍一律只用社維法", "option_c": "完全免罰", "option_d": "只依民法買賣處理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出若符合性騷擾防治法§2定義，優先適用特別法之行政罰或刑事罰。", "topic": "調戲與性騷擾分流", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "第32講提到性騷擾防治法若涉及觸摸，可能連結何者？", "option_a": "§25觸摸罪", "option_b": "刑法§196偽造貨幣罪", "option_c": "刑法§354毀損罪", "option_d": "社維法§76報告義務", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出性騷擾防治法可能涉及§25觸摸罪。", "topic": "觸摸罪連結", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "依第32講，§84非公共場所賭博的核心是什麼？", "option_a": "私人住宅、空屋等非公共場所之職業賭場，賭博財物", "option_b": "公共場所偶然下棋", "option_c": "合法麻將娛樂且無職業賭場", "option_d": "性交易雙方罰鍰", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出§84構成為非公共場所之職業賭場，賭博財物。", "topic": "§84私人職業賭博", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "依第32講，刑法§266賭博罪限於何種場所？", "option_a": "公共場所或公眾得出入之場所", "option_b": "所有私人住宅", "option_c": "所有空屋", "option_d": "任何網路聊天室", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出刑法§266限於公共場所或公眾得出入之場所。", "topic": "刑法§266限制", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}, {"id": "SOMA32B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "社維法§84相對於刑法§266，依第32講功能為何？", "option_a": "補足刑法不足，裁罰私人空間內職業賭博", "option_b": "完全廢止刑法§266", "option_c": "只處理性交易專區", "option_d": "只處理公共乞討", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出社維法§84補足刑法不足，針對私人空間內職業賭博裁罰。", "topic": "§84補洞功能", "source": "Notion：社會秩序維護法 / 第32講 / 再一次"}];let current=0;let answers=Array(questions.length).fill(null);function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}function choose(letter){if(!answers[current])answers[current]=letter;render()}function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}function nextQ(){if(current<questions.length-1)current++;render()}function prevQ(){if(current>0)current--;render()}function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}render();</script></body></html>
