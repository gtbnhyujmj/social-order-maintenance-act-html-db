MA03B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "罰鍰分期繳納時，依第03講，每期多久？", "option_a": "15日", "option_b": "10日", "option_c": "30日", "option_d": "3個月", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講指出罰鍰分期繳納最多3個月，每期15日。", "topic": "罰鍰分期期距", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "社維法沒入物品處理，依第03講，下列何者正確？", "option_a": "拍賣、銷毀、留用", "option_b": "判死刑、徒刑、拘役", "option_c": "撤銷婚姻、離婚、收養", "option_d": "公司增資、減資、清算", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講指出沒入物品之處理包含拍賣、銷毀、留用。", "topic": "沒入物處理混淆", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "釋字166討論違警罰法中拘留、罰役由警察裁定是否違憲。依第03講，其核心原則為何？", "option_a": "司法保留原則", "option_b": "平等原則", "option_c": "一行為不二罰", "option_d": "信賴保護", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講指出釋字166確認拘留、罰役由警察裁定違憲，應改由法院裁定，原則為司法保留。", "topic": "釋字166爭點", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "送交矯正處所亦屬限制人身自由，應由法院裁定。依第03講，這是哪號解釋的重點？", "option_a": "釋字第251號", "option_b": "釋字第166號", "option_c": "釋字第503號", "option_d": "釋字第666號", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講指出釋字251補充166號，送交矯正處所亦屬限制人身自由，應由法院裁定。", "topic": "釋字251補充", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "釋字166與251在第03講中的共同核心，最接近何者？", "option_a": "涉及人身自由的終局裁斷權屬司法權", "option_b": "所有行政罰都不得存在", "option_c": "所有性交易都合法", "option_d": "稅捐與行為罰必然可重複處罰", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講國考連結指出166、251確立涉及人身自由之終局裁斷權屬司法權。", "topic": "166與251共通", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "依第03講，釋字166、251後，警察對涉及人身自由案件的角色較正確為何？", "option_a": "初步調查與非人身自由處分權", "option_b": "終局裁定拘留權", "option_c": "完全不得調查", "option_d": "民事判決權", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講指出行政機關警察僅具初步調查與非人身自由處分權，涉及人身自由終局裁斷屬司法權。", "topic": "行政機關權限", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "某一行為同時被課以兩個性質相同的處罰。依第03講釋字503，應如何？", "option_a": "同一行為若處罰種類相同，不得重複處罰", "option_b": "只要機關想處罰就可無限重複", "option_c": "相同種類處罰一定要加倍", "option_d": "所有罰鍰都必然違憲", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講指出釋字503認為同一行為若處罰種類相同，不得重複處罰。", "topic": "釋字503類型", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "某一行為同時有罰鍰與沒入。依第03講釋字503，若處罰種類不同，原則上如何？", "option_a": "種類不同者始得併罰", "option_b": "種類不同也一律不得併罰", "option_c": "必然全部違憲", "option_d": "必然只留拘留", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講指出若處罰種類不同，例如罰鍰與沒入，始得併罰。", "topic": "釋字503種類不同", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "第03講指出釋字503是行政罰法§24的重要法理基礎。這主要連結哪個原則？", "option_a": "一行為不二罰原則", "option_b": "司法保留原則", "option_c": "秘密通訊自由", "option_d": "職業自由客觀許可制", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講國考連結指出釋字503是行政罰法§24之一行為不二罰法理基礎。", "topic": "行政罰法§24連結", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "社維法§80第1項第1款罰娼不罰嫖，依第03講釋字666，違反何者？", "option_a": "平等原則", "option_b": "司法保留", "option_c": "一行為不二罰", "option_d": "提審權利", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講指出釋字666認為罰娼不罰嫖違反平等原則。", "topic": "釋字666爭點", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "依第03講，釋字666後，現行法關於性交易的大方向為何？", "option_a": "專區內合法，專區外皆罰", "option_b": "全國一律完全合法", "option_c": "只罰娼不罰嫖", "option_d": "只罰嫖不罰娼且無例外", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講補充指出現行法改為專區內合法，專區外皆罰。", "topic": "性交易專區", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "依第03講，多數縣市未設性交易專區時，實務上呈現何種現況？", "option_a": "實務上仍呈現全面處罰", "option_b": "完全不處罰", "option_c": "只有法院可處民事賠償", "option_d": "一律由公司法處理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講指出由於多數縣市未設專區，實務上仍呈現全面處罰之現況。", "topic": "未設專區現況", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "一行為同時觸犯刑法與社維法。依第03講，在刑事優先下，社維法何種處罰通常不再執行？", "option_a": "拘留", "option_b": "罰鍰與沒入一定完全不得併行", "option_c": "申誡一定改為死刑", "option_d": "沒入一定轉成徒刑", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講指出刑事優先原則下，行政罰社維法之拘留通常不再執行。", "topic": "刑事優先與拘留", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}, {"id": "SOMA03B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "遇到社維法第03講案例題，最適合的答題骨架為何？", "option_a": "先分警察處分/法院裁定救濟，再看易以拘留與執行，最後套166/251/503/666", "option_b": "只背民法契約解除", "option_c": "只看公司章程", "option_d": "只討論繼承順位", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第03講重點在救濟程序、易以拘留、執行細節與四大釋字，案例題應先定位裁處與救濟，再處理執行與憲法原則。", "topic": "整體答題骨架", "source": "Notion：社會秩序維護法 / 第03講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
