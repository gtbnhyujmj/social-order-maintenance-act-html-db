<script>

orrect": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出現行違序有證據滅失之虞，或證人不能到場時，得於所在地或適當處所訊問。", "topic": "所在地訊問", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，逕行處分例外主要針對何種案件？", "option_a": "§43第一項各款案件，如專處罰鍰、沒入、申誡", "option_b": "拘留案件", "option_c": "勒令歇業案件", "option_d": "刑事有期徒刑案件", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出逕行處分針對§43第一項各款案件，專處罰鍰、沒入、申誡等。", "topic": "逕行處分對象", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，得不經通知訊問逕行處分之要件為何？", "option_a": "情節輕微且事實明確", "option_b": "情節重大且事實不明", "option_c": "只要警察繁忙", "option_d": "只要嫌疑人不同意", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出若情節輕微且事實明確，得不經通知訊問逕行處分。", "topic": "逕行處分要件", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，訊問時嚴禁何種方法？", "option_a": "強暴、脅迫、利誘、詐欺", "option_b": "告知事由", "option_c": "給予辯解機會", "option_d": "製作筆錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出訊問嚴禁強暴、脅迫、利誘、詐欺。", "topic": "禁止不正方法", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，訊問筆錄應如何製作？", "option_a": "當場製作，文句通俗易懂", "option_b": "事後任意補寫即可", "option_c": "只用口頭記憶即可", "option_d": "由民眾自行上網填寫即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出應當場製作筆錄，文句通俗易懂。", "topic": "當場筆錄", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，訊問筆錄不得如何？", "option_a": "任意篡改", "option_b": "記載拒絕簽名理由", "option_c": "當場製作", "option_d": "文句通俗易懂", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出訊問筆錄禁止任意篡改。", "topic": "禁止篡改", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，行為人提出有利事實及證明方法時，警察 ype": "multiple_choice", "question": "依第22講，對現行違序行為，警察得如何通知到場？", "option_a": "口頭通知到場", "option_b": "只能書面通知", "option_c": "只能法院傳票", "option_d": "只能電子郵件", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出現行違序行為，警察應即時制止，並得口頭通知到場。", "topic": "口頭通知", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，現行違序人不服口頭通知者，警察得如何？", "option_a": "強制到場", "option_b": "直接免責", "option_c": "只能寄存證信函", "option_d": "只能民事起訴", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出現行違序行為不服通知者，得強制到場。", "topic": "不服通知強制到場", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，若已知姓名住居所且無逃亡之虞，應如何？", "option_a": "回歸§41書面通知，不得逕行強制", "option_b": "仍可任意強制到場", "option_c": "必須立即逮捕", "option_d": "必須直接拘留5日", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出若已知姓名住居所且無逃亡之虞，應回歸§41書面通知，不得逕行強制。", "topic": "強制到場界限", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，§42強制到場之法律性質為何？", "option_a": "限制人身自由，性質等同刑事逮捕", "option_b": "純粹行政指導", "option_c": "民事契約履行", "option_d": "營業自由限制", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出強制到場屬限制人身自由，性質等同刑事逮捕。", "topic": "強制到場性質", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，強制到場時應依何法告知本人及親友得申請提審？", "option_a": "提審法", "option_b": "公司法", "option_c": "票據法", "option_d": "土地法", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出強制到場應依《提審法》告知本人及親友得申請提審。", "topic": "提審法告知", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，強制到場不得超過多久？", "option_a": "24小時", "option_b": "5日", "option_c": "3個月", "option_d": "6個月", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出強制到場不得超過24小時。", "topic": "強制到場時間上限", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，使用警銬、警繩等強制力應如何？", "option_a": "限於必要程度，注意身體與名譽", "option_b": "一律使用且不用理由", "option_c": "完全不得考量比例原則", "option_d": "只看警察方便", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出使用警銬、警繩等強制力應限於必要程度，並注意受訊問人身體與名譽。", "topic": "警銬警繩比例", "source": "Notion：社會秩序維護法 / 第22講"}, {"id": "SOMA22-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "依第22講補充，§42強制到場是國考熱點，作答應強調何者？", "option_a": "正當法律程序、提審法與比例原則", "option_b": "契約自由與物權法定", "option_c": "公司治理與股東權", "option_d": "票據無因性", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講補充指出§42強制到場是國考熱點，應注意與刑事逮捕異同，並強調提審法與比例原則。", "topic": "第22講國考熱點", "source": "Notion：社會秩序維護法 / 第22講"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
