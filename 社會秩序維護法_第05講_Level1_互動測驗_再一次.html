<script>
const questions = [{"id": "SOMA05B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "甲同一行為同時構成社維法違序與刑法犯罪。依第05講，原則上應如何處理？", "option_a": "移送檢察官優先處理", "option_b": "警察直接以社維法終結，不用管刑法", "option_c": "一律由行政執行署處理", "option_d": "一律不處罰", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出同一行為同時違反社維法與刑法時，應移送檢察官優先處理。", "topic": "§38刑事進合", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "少年同一行為同時違反社維法與少年事件處理法。依第05講，應優先移送何處？", "option_a": "少年法庭", "option_b": "檢察官", "option_c": "行政執行署", "option_d": "民事法院", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出同一行為同時違反社維法與少年事件處理法時，應移送少年法庭優先處理。", "topic": "少年事件進合", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "即便刑事先行，社維法特有處分仍可能併行。依第05講，下列何者屬此類？", "option_a": "停止營業、勒令歇業", "option_b": "有期徒刑、拘役", "option_c": "緩刑、假釋", "option_d": "死刑、無期徒刑", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出停止營業、勒令歇業是刑事法無此種類，刑事先行下仍得併予裁處。", "topic": "刑事先行例外", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "刑事先行後，社維法罰鍰仍可能裁處。依第05講，理由為何？", "option_a": "罰鍰是行政罰，與刑法罰金性質不同", "option_b": "罰鍰就是刑法罰金，完全相同", "option_c": "罰鍰只能由刑事法院判決", "option_d": "罰鍰一律不得併行", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出罰鍰與罰金不同，行政罰與刑罰性質不同，仍得依社維法裁處。", "topic": "罰鍰罰金區別", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "刑事案件處理後，社維法沒入仍可能裁處。依第05講，理由為何？", "option_a": "沒入與刑法沒收性質不同", "option_b": "沒入與沒收完全相同且必然排斥", "option_c": "沒入只能民事執行", "option_d": "沒入只適用少年事件", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出罰鍰、沒入因性質與罰金、沒收不同，仍得依社維法裁處。", "topic": "沒入沒收區別", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "社維法與行政執行法關係中，行政執行法扮演何種角色？", "option_a": "基本法性質", "option_b": "刑事特別法性質", "option_c": "民事特別法性質", "option_d": "完全無補充可能", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出行政執行法為基本法性質。", "topic": "行政執行法定位", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "社維法罰鍰逾期不繳時，依第05講，原則上先採何程序？", "option_a": "依社維法§20申請易以拘留", "option_b": "直接移送行政執行署", "option_c": "直接改判刑法有期徒刑", "option_d": "直接由民事法院強制執行", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出罰鍰逾期不繳時，原則上先依社維法§20申請易以拘留。", "topic": "罰鍰不繳第一步", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "社維法罰鍰何時才轉為公法上金錢給付義務，移送行政執行署？", "option_a": "法院駁回且不請求易以拘留時", "option_b": "一裁處罰鍰就必然移送", "option_c": "提出聲明異議時必然移送", "option_d": "只要是少年案件就移送", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出法院駁回且不請求易以拘留，始轉換為公法上金錢給付義務，移送行政執行署。", "topic": "轉行政執行時點", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "行政程序法與社維法關係中，行政程序法屬於何種性質？", "option_a": "普通法性質", "option_b": "基本法性質", "option_c": "刑事法性質", "option_d": "國際法性質", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出行政程序法在與社維法關係中為普通法性質。", "topic": "行政程序法定位", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "社維法§42口頭通知屬社維法特別程序。依第05講，遇到此類特別程序時應如何？", "option_a": "優先適用社維法", "option_b": "一律改用行政程序法", "option_c": "一律改用民事訴訟法", "option_d": "一律不得適用", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出社維法有特別程序規定，如§42口頭通知時優先適用社維法。", "topic": "§42口頭通知", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "社維法§44不經調查程序屬特別程序。依第05講，應如何處理？", "option_a": "優先適用社維法特別規定", "option_b": "一律適用行政程序法而排除社維法", "option_c": "一律改由刑事訴訟法處理", "option_d": "一律交公司董事會決定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出社維法有特別程序規定，如§44不經調查程序時優先適用社維法。", "topic": "§44不經調查程序", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "社維法無特別規定時，行政程序法哪些一般原則仍可能適用？", "option_a": "明確、比例、誠信、迴避", "option_b": "罪刑法定、刑罰謙抑、無罪推定", "option_c": "物權法定、公示公信", "option_d": "股東平等、資本維持", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出其餘一般原則如明確、比例、誠信原則與迴避，適用行政程序法。", "topic": "行政程序法補充", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "行政罰法與社維法關係中，何者正確？", "option_a": "行政罰法為普通法，社維法為特別法", "option_b": "行政罰法永遠優先於社維法", "option_c": "社維法與行政罰法完全無關", "option_d": "行政罰法只適用刑事犯罪", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出行政罰法為普通法，社維法為特別法。", "topic": "行政罰法定位", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "社維法與行政罰法競合時，責任要件與裁處程序原則上先適用何者？", "option_a": "社維法", "option_b": "行政罰法永遠優先", "option_c": "民法", "option_d": "公司法", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出社維法為特別法，責任要件、裁處程序優先適用社維法。", "topic": "責任要件優先", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "社維法未規定法人責任時，依第05講，可補充適用何法？", "option_a": "行政罰法§7法人責任", "option_b": "刑法§38沒收", "option_c": "民法侵權責任", "option_d": "公司法董事責任", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出社維法未規定者，如行政罰法§7法人責任，得補充適用行政罰法。", "topic": "行政罰法§7", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "社維法未規定欠缺違法認識之免罰時，依第05講，可補充適用何者？", "option_a": "行政罰法§8", "option_b": "社維法§38", "option_c": "刑法§38", "option_d": "民法§184", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出社維法未規定者，如行政罰法§8欠缺違法認識之免罰，補充適用行政罰法。", "topic": "欠缺違法認識", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "社維法§31的2個月調查時效與行政罰法3年裁處權時效不同時，依第05講應如何？", "option_a": "社維法特別規定優先", "option_b": "行政罰法3年永遠優先", "option_c": "兩者都不適用", "option_d": "由民法消滅時效決定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講國考連結指出社維法§31之2個月調查時效，優於行政罰法3年裁處權時效。", "topic": "調查時效特別法", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "下列何者最符合第05講對社維法法律性質的整理？", "option_a": "國內法、公法、普通法、強行法、成文法，且具實體法兼程序法性質", "option_b": "外國法、私法、任意法、習慣法", "option_c": "純粹刑法，無行政法性質", "option_d": "純粹民事法，無程序規定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出社維法為國內法、公法、普通法、強行法、成文法，且具實體法兼程序法性質。", "topic": "社維法法律性質陷阱", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "某人依法有通報義務卻知情不報。依第05講，這是何種行為態樣例子？", "option_a": "不作為", "option_b": "作為", "option_c": "共同正維序", "option_d": "查禁物", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出§76知情不報是不作為例子。", "topic": "§76知情不報", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "第05講提到及時與非及時，主要是在區分何者？", "option_a": "狀態犯與繼續犯", "option_b": "自然人與法人", "option_c": "罰鍰與罰金", "option_d": "聲明異議與抗告", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出及時與非及時涉及狀態犯與繼續犯之區別。", "topic": "狀態犯繼續犯", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "甲乙具意識聯絡與行為分擔，共同實施違序。依第05講，屬何者？", "option_a": "共同正維序", "option_b": "利用維序", "option_c": "幫助維序", "option_d": "教唆維序", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出共同正維序是具意識聯絡與行為分擔。", "topic": "多數人參與比較", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "甲利用無責任能力人實施違序行為。依第05講，較接近何者？", "option_a": "利用維序", "option_b": "共同正維序", "option_c": "幫助維序", "option_d": "再有違反", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出利用維序為間接正犯概念，利用無責任能力人。", "topic": "利用無責任能力人", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "甲提供工具或精神鼓勵，協助他人違序，但未使其萌生犯意。依第05講，較接近何者？", "option_a": "幫助維序", "option_b": "教唆維序", "option_c": "利用維序", "option_d": "再次違反", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出幫助維序是提供物質或精神助力。", "topic": "精神物質助力", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "甲本無意違序，乙勸說後使甲萌生違序意圖。依第05講，乙較接近何者？", "option_a": "教唆維序", "option_b": "幫助維序", "option_c": "查禁物", "option_d": "狀態犯", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出教唆維序是使他人萌生維序意圖。", "topic": "萌生違序意圖", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}, {"id": "SOMA05B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "依第05講，下列配對何者正確？", "option_a": "再有違反：條款不同；再次違反：同一條款；深夜：0時至5時", "option_b": "再有違反：同一條款；再次違反：條款不同；深夜：22時至6時", "option_c": "查禁物：所有動產；深夜：20時至24時", "option_d": "共同正維序：利用無責任能力人；幫助維序：使人萌生意圖", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出再有違反為前後條款不同，再次違反為同一條款；深夜為凌晨0時至5時。", "topic": "名詞總陷阱", "source": "Notion：社會秩序維護法 / 第05講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
