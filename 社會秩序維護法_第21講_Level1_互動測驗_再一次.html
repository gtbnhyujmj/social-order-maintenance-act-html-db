e", "question": "依第21講補充，§40沒入兼具何種性質？", "option_a": "證據與處罰性質", "option_b": "純粹民事契約", "option_c": "純粹公司治理", "option_d": "純粹繼承分割", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講補充指出§40沒入兼具證據與處罰性質。", "topic": "沒入性質補充", "source": "Notion：社會秩序維護法 / 第21講 / 再一次"}, {"id": "SOMA21B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "依第21講，§41通知書必載事項包括何者？", "option_a": "人別資料、事由、應到時間地點、不到場效果、通知機關署名", "option_b": "只要寫罰鍰金額即可", "option_c": "只要寫警察姓名即可", "option_d": "只要口頭通知即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出通知書必載事項包含人別資料、事由、應到時間地點、不到場效果、通知機關署名。", "topic": "通知書必載", "source": "Notion：社會秩序維護法 / 第21講 / 再一次"}, {"id": "SOMA21B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "§41通知書應載明不到場效果，依第21講可能是什麼？", "option_a": "得逕行裁處", "option_b": "必然免責", "option_c": "必然自首", "option_d": "必然刑事不起訴", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出通知書必載不到場效果，即得逕行裁處。", "topic": "不到場效果", "source": "Notion：社會秩序維護法 / 第21講 / 再一次"}, {"id": "SOMA21B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "訊問前，依第21講警察應如何？", "option_a": "先告知事由，並給予辯解機會", "option_b": "直接裁罰不必說明", "option_c": "先沒入所有物", "option_d": "只問被害人即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出訊問權利保障包含告知義務：應先告知事由，並給予辯解機會。", "topic": "告知義務", "source": "Notion：社會秩序維護法 / 第21講 / 再一次"}, {"id": "SOMA21B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "§41通知與告知義務，依第21講補充，是行政程序法何種制度之具體化？", "option_a": "陳述意見機會", "option_b": "行政契約自由", "option_c": "即時強制無限制", "option_d": "公物管理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講補充指出§41通知與告知義務，是行政程序法中陳述意見機會的具體化。", "topic": "正當法律程序", "source": "Notion：社會秩序維護法 / 第21講 / 再一次"}, {"id": "SOMA21B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "若警察未告知事由即訊問，依第21講可能造成何問題？", "option_a": "筆錄證據能力受質疑", "option_b": "必然加重處罰", "option_c": "必然無法救濟", "option_d": "必然成立自首", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講補充指出若警察未告知事由即進行訊問，該筆錄之證據能力將受質疑。", "topic": "未告知筆錄", "source": "Notion：社會秩序維護法 / 第21講 / 再一次"}, {"id": "SOMA21B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "依第21講，嫌疑人對到場程序可如何？", "option_a": "得委任代理人到場", "option_b": "絕對不得委任代理人", "option_c": "只能由被害人代理", "option_d": "只能由檢察官代理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出嫌疑人得委任代理人到場。", "topic": "代理人到場", "source": "Notion：社會秩序維護法 / 第21講 / 再一次"}, {"id": "SOMA21B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "嫌疑人雖得委任代理人，但依第21講必要時仍可如何？", "option_a": "命本人親自到場", "option_b": "永遠不得命本人到場", "option_c": "只能書面裁處", "option_d": "只能由鄰居代替", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出嫌疑人得委任代理人到場，但必要時仍得命本人親自到場。", "topic": "本人親自到場", "source": "Notion：社會秩序維護法 / 第21講 / 再一次"}, {"id": "SOMA21B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "證人或關係人有正當理由不到場時，依第21講經許可後可如何？", "option_a": "以書面陳述", "option_b": "一律拘留", "option_c": "自動成為嫌疑人", "option_d": "一律不得陳述", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出證人或關係人有正當理由不到場，得經許可以書面陳述。", "topic": "證人書面陳述", "source": "Notion：社會秩序維護法 / 第21講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
