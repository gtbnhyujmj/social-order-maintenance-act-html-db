, "option_d": "行為人居所或所在地", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出土地管轄為行為地、行為人住所、居所或所在地之法院或警察機關。", "topic": "土地管轄", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "甲在A地違序，依第20講，下列何者有可能具土地管轄？", "option_a": "A地法院或警察機關", "option_b": "完全無管轄機關", "option_c": "只能甲戶籍地", "option_d": "只能最高法院", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出行為地之法院或警察機關有土地管轄。", "topic": "行為地管轄", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，在領域外中華民國船艦或航空器內違序，適用何種管轄？", "option_a": "§34浮動領土管轄", "option_b": "§27自首管轄", "option_c": "§30加減管轄", "option_d": "§91-1性交易專區", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出在領域外中華民國船艦或航空器內違序，適用§34浮動領土管轄。", "topic": "浮動領土管轄", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，浮動領土管轄可能由何地之法院或警察機關管轄？", "option_a": "船艦本籍地、航空器出發地、或行為後停泊地", "option_b": "被害人出生地", "option_c": "行為人就學地", "option_d": "任何國家法院", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出浮動領土管轄為船艦本籍地、航空器出發地、或行為後停泊地之法院或警察機關。", "topic": "船艦航空器管轄地", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，警察管轄原則上由何者管轄？", "option_a": "警察局、分局", "option_b": "普通法院民事庭", "option_c": "行政執行署", "option_d": "里長辦公室", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出警察管轄分工由警察局、分局管轄。", "topic": "警察管轄分工", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，地域遼闊處可授權何者行使？", "option_a": "警察所或分駐所", "option_b": "民間保全公司", "option_c": "村里長", "option_d": "被害人家屬", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出地域遼闊處可授權警察所或分駐所行使。", "topic": "警察所分駐所", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，專業警察機關須經何者核准始具管轄權？", "option_a": "內政部", "option_b": "司法院", "option_c": "法務部", "option_d": "考試院", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出專業警察機關須經內政部核准始具管轄權。", "topic": "專業警察核准", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，下列何者屬專業警察機關例示？", "option_a": "保二、航警、國道、鐵警、港警", "option_b": "一般里辦公室", "option_c": "民間保全公司", "option_d": "商業登記機關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講例示專業警察機關如保二、航警、國道、鐵警、港警。", "topic": "專業警察例示", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "依第20講國考連結，若未經核准之專業警察機關逕行裁處，可能構成何種瑕疵？", "option_a": "管轄錯誤之違法行政處分", "option_b": "當然合法", "option_c": "民事契約不成立", "option_d": "刑事判決無效", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講補充指出若非核准機關如保七逕行裁處，屬管轄錯誤之違法行政處分。", "topic": "未核准機關裁處", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，法院簡易庭之組織為何？", "option_a": "法官一人獨任，第一審", "option_b": "法官三人合議，抗告審", "option_c": "警察局長裁定", "option_d": "行政執行官裁定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出簡易庭為法官一人獨任，屬第一審。", "topic": "簡易庭組織", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，普通庭功能為何？", "option_a": "救濟審或抗告審", "option_b": "第一審獨任審", "option_c": "警察裁處機關", "option_d": "行政執行機關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出普通庭為法官三人合議，功能為救濟審/抗告審。", "topic": "普通庭功能", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "依第20講補充，拘留交由法院簡易庭裁定，是為符合何種原則？", "option_a": "憲法法官保留原則", "option_b": "契約自由原則", "option_c": "物權法定原則", "option_d": "公司自治原則", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講補充指出社維法將拘留交由法院簡易庭裁定，是為符合釋字166、251號解釋與法官保留原則。", "topic": "法官保留", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，§38一行為同時違反社維法與刑事法律時，應如何？", "option_a": "移送檢察官或少年法庭", "option_b": "警察仍先裁處拘留罰鍰", "option_c": "直接免除所有處罰", "option_d": "只由商業登記機關處理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出一行為同時違反社維法與刑事法律或少年事件處理法時，應移送檢察官或少年法庭。", "topic": "刑事優先", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，若一行為同時涉及少年事件處理法，應移送何者？", "option_a": "少年法庭", "option_b": "商業登記機關", "option_c": "民事庭", "option_d": "里長辦公室", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出同時違反少年事件處理法時，應移送少年法庭。", "topic": "少年事件", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，若刑事法律已處罰，社維法之何種處罰原則上不再處罰？", "option_a": "拘留與罰鍰", "option_b": "停止營業與勒令歇業必然吸收", "option_c": "沒入必然吸收", "option_d": "所有行政處分一律消滅", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出若刑事法律已處罰，社維法之拘留與罰鍰原則上不再處罰。", "topic": "拘留罰鍰吸收", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，拘留與罰鍰被刑事處罰吸收，主要體現何原則？", "option_a": "一行為不二罰", "option_b": "比例原則必然免罰", "option_c": "信賴保護原則", "option_d": "誠實信用原則", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出刑事法律已處罰時，拘留與罰鍰原則不再處罰，屬一行為不二罰。", "topic": "一行為不二罰", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，刑事程序優先下，下列何者仍可能依社維法裁處？", "option_a": "停止營業、勒令歇業、沒入", "option_b": "拘留與罰鍰必然併行", "option_c": "申誡必然併行", "option_d": "刑事有期徒刑", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出停止營業、勒令歇業及沒入因具行政管理目的，仍得依社維法裁處。", "topic": "行政罰併行", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，停止營業、勒令歇業、沒入可併行之理由為何？", "option_a": "具行政管理目的，不被刑事罰吸收", "option_b": "完全不是行政處分", "option_c": "必然屬民事賠償", "option_d": "由被害人自由決定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講補充指出停業、歇業與行政沒入具特殊行政管理目的，不被刑事罰吸收。", "topic": "行政管理目的", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，社維法§38與行政罰法§26之精神為何？", "option_a": "刑事程序優先，但特定行政管理處分仍可併行", "option_b": "行政罰永遠優先刑罰", "option_c": "刑罰與行政罰永遠全部併罰", "option_d": "民事責任優先一切", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講補充指出社維法§38與行政罰法§26精神一致：刑事程序優先，但行政沒入與停業/歇業等具特殊目的仍可併行。", "topic": "社維法§38與行政罰法§26", "source": "Notion：社會秩序維護法 / 第20講"}, {"id": "SOMA20-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "第20講國考作答時，遇到社維法與刑事犯罪競合，最安全的論述方向為何？", "option_a": "先刑事優先移送，再判斷拘留罰鍰是否吸收，最後檢討停業歇業沒入是否可併行", "option_b": "直接全部行政裁處即可", "option_c": "直接全部免罰即可", "option_d": "只討論民法侵權行為", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講核心在§38刑事優先與行政罰併行界線：刑事優先，拘留罰鍰原則吸收，但停止營業、勒令歇業、沒入仍可能併行。", "topic": "第20講總整理", "source": "Notion：社會秩序維護法 / 第20講"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
