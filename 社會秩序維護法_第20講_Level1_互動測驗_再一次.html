iple_choice", "question": "社維法將拘留交由法院簡易庭裁定，依第20講補充，是為了符合何者？", "option_a": "釋字166、251與法官保留原則", "option_b": "民法契約自由", "option_c": "公司法董事自治", "option_d": "票據法文義性", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講補充指出拘留交由法院簡易庭裁定，是為符合釋字166、251號解釋與法官保留。", "topic": "拘留法院審查", "source": "Notion：社會秩序維護法 / 第20講 / 再一次"}, {"id": "SOMA20B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "一行為同時違反社維法與刑事法律，依第20講，原則上應如何？", "option_a": "移送檢察官或少年法庭", "option_b": "警察先處拘留罰鍰再說", "option_c": "完全免責", "option_d": "只移送商業登記機關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出§38刑事優先：一行為同時違反社維法與刑事法律或少年事件處理法時，應移送檢察官或少年法庭。", "topic": "§38刑事優先", "source": "Notion：社會秩序維護法 / 第20講 / 再一次"}, {"id": "SOMA20B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "一行為同時涉及少年事件處理法，依第20講應移送何者？", "option_a": "少年法庭", "option_b": "檢察官必然唯一", "option_c": "商業登記機關", "option_d": "民事庭", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出同時涉及少年事件處理法時，應移送少年法庭。", "topic": "少年事件移送", "source": "Notion：社會秩序維護法 / 第20講 / 再一次"}, {"id": "SOMA20B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "若刑事法律已處罰，依第20講，社維法哪些處罰原則上不再處罰？", "option_a": "拘留與罰鍰", "option_b": "停止營業、勒令歇業、沒入", "option_c": "所有行政管理處分", "option_d": "只有申誡", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出刑事法律已處罰時，社維法拘留與罰鍰原則上不再處罰。", "topic": "拘留罰鍰吸收", "source": "Notion：社會秩序維護法 / 第20講 / 再一次"}, {"id": "SOMA20B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "刑事處罰後社維法拘留、罰鍰原則不再處罰，主要連結何原則？", "option_a": "一行為不二罰", "option_b": "信賴保護必然免責", "option_c": "行政指導優先", "option_d": "私法自治", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出拘留與罰鍰被刑事處罰吸收，體現一行為不二罰。", "topic": "不二罰核心", "source": "Notion：社會秩序維護法 / 第20講 / 再一次"}, {"id": "SOMA20B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "刑事程序優先下，依第20講，何者仍可能依社維法裁處？", "option_a": "停止營業、勒令歇業、沒入", "option_b": "拘留與罰鍰必然併罰", "option_c": "刑事有期徒刑", "option_d": "少年保護處分", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出停止營業、勒令歇業、沒入因具行政管理目的，仍得依社維法裁處。", "topic": "併行行政處分", "source": "Notion：社會秩序維護法 / 第20講 / 再一次"}, {"id": "SOMA20B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，停業、歇業、沒入不被刑事罰吸收的主要理由為何？", "option_a": "具特殊行政管理目的", "option_b": "完全不是處分", "option_c": "因為一定比刑罰輕", "option_d": "因為被害人要求", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講補充指出停業、歇業與行政沒入具特殊行政管理目的，不被刑事罰吸收。", "topic": "行政管理目的判斷", "source": "Notion：社會秩序維護法 / 第20講 / 再一次"}, {"id": "SOMA20B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，社維法§38與行政罰法§26精神一致，重點為何？", "option_a": "刑事程序優先，但具特殊目的之行政處分仍可併行", "option_b": "行政罰永遠優先刑罰", "option_c": "刑事罰與行政罰永遠全部並罰", "option_d": "民事賠償吸收一切", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講補充指出社維法§38與行政罰法§26精神一致：刑事程序優先，但行政沒入與停業/歇業仍有特殊目的。", "topic": "行政罰法§26連結", "source": "Notion：社會秩序維護法 / 第20講 / 再一次"}, {"id": "SOMA20B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "遇到社維法與刑事犯罪競合案例，依第20講最安全答題順序為何？", "option_a": "先刑事優先移送，再判斷拘留罰鍰是否吸收，最後檢討停業歇業沒入是否可併行", "option_b": "先全部行政裁處，再考慮刑事", "option_c": "直接全部免罰", "option_d": "只討論民事侵權", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講核心在§38：刑事優先，拘留罰鍰原則吸收，但停業、歇業、沒入仍可能併行。", "topic": "競合答題順序", "source": "Notion：社會秩序維護法 / 第20講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
