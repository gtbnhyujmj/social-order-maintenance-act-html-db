n_c": "直接拘留", "option_d": "筆錄自動作廢且案件不得處理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出拒簽不得強制，但應將拒絕事實與理由附記於筆錄。", "topic": "拒簽筆錄處理", "source": "Notion：社會秩序維護法 / 第22講 / 再一次"}, {"id": "SOMA22B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "警察面對現行違序行為，依第22講應先如何？", "option_a": "即時制止", "option_b": "等書面通知寄達後再處理", "option_c": "先移送行政執行署", "option_d": "先找民事法院調解", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出現行違序行為，警察應即時制止。", "topic": "現行違序即時制止", "source": "Notion：社會秩序維護法 / 第22講 / 再一次"}, {"id": "SOMA22B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "現行違序行為，依第22講警察得如何通知到場？", "option_a": "口頭通知到場", "option_b": "只能掛號書面通知", "option_c": "只能法院傳票", "option_d": "只能電子郵件", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出現行違序行為，警察得口頭通知到場。", "topic": "口頭通知到場", "source": "Notion：社會秩序維護法 / 第22講 / 再一次"}, {"id": "SOMA22B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "現行違序人不服口頭通知，依第22講警察得如何？", "option_a": "得強制到場", "option_b": "必須放任不處理", "option_c": "只能口頭勸導一次", "option_d": "直接免除處罰", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出現行違序行為不服通知者，得強制到場。", "topic": "強制到場要件", "source": "Notion：社會秩序維護法 / 第22講 / 再一次"}, {"id": "SOMA22B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "現行違序人姓名住居所均明確且無逃亡之虞。依第22講，警察應如何？", "option_a": "回歸§41書面通知，不得逕行強制", "option_b": "仍可任意強制到場", "option_c": "必須使用警銬", "option_d": "直接留置24小時", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出若已知姓名住居所且無逃亡之虞，應回歸§41書面通知，不得逕行強制。", "topic": "強制到場界限案例", "source": "Notion：社會秩序維護法 / 第22講 / 再一次"}, {"id": "SOMA22B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "§42強制到場依第22講性質為何？", "option_a": "限制人身自由，性質等同刑事逮捕", "option_b": "純粹行政指導", "option_c": "民事契約履行", "option_d": "營業自由限制", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出強制到場屬限制人身自由，性質等同刑事逮捕。", "topic": "強制到場法律性質", "source": "Notion：社會秩序維護法 / 第22講 / 再一次"}, {"id": "SOMA22B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "§42強制到場時，依第22講應告知本人及親友何種權利？", "option_a": "得依提審法申請提審", "option_b": "得申請公司登記", "option_c": "得請求民事分割", "option_d": "得聲請支付命令", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出強制到場應依提審法告知本人及親友得申請提審。", "topic": "提審法保障", "source": "Notion：社會秩序維護法 / 第22講 / 再一次"}, {"id": "SOMA22B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "依第22講，強制到場不得超過多久？", "option_a": "24小時", "option_b": "5日", "option_c": "20日", "option_d": "3個月", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出強制到場不得超過24小時。", "topic": "24小時上限", "source": "Notion：社會秩序維護法 / 第22講 / 再一次"}, {"id": "SOMA22B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "使用警銬、警繩等強制力，依第22講應如何？", "option_a": "限於必要程度，注意身體與名譽", "option_b": "一律使用才合法", "option_c": "不用考量比例原則", "option_d": "只看警察方便", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第22講指出使用警銬、警繩等強制力應限於必要程度，並注意受訊問人之身體與名譽。", "topic": "強制力比例原則", "source": "Notion：社會秩序維護法 / 第22講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
