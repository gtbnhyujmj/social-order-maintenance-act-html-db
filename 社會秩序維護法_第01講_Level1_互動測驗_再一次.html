666認為主要違反何者？", "option_a": "憲法第7條平等原則", "option_b": "憲法第8條人身自由", "option_c": "憲法第15條工作權一律保障到不得管制", "option_d": "憲法第11條言論自由", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出釋字666針對罰娼不罰嫖，認為違反憲法第7條平等原則。", "topic": "釋字666平等原則", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "釋字666後，社維法§80修法方向為何？", "option_a": "專區經營、娼嫖皆罰", "option_b": "罰娼不罰嫖維持不變", "option_c": "只罰嫖不罰娼", "option_d": "完全廢除所有社維法處罰", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出釋字666促成100年修法，改採專區經營、娼嫖皆罰原則。", "topic": "§80修法方向", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "下列哪一組完全屬於第01講列出的社維法六種處罰？", "option_a": "拘留、勒令歇業、停止營業、罰鍰、沒入、申誡", "option_b": "死刑、無期徒刑、有期徒刑、拘役、罰金", "option_c": "撤銷、廢止、確認無效、給付判決", "option_d": "損害賠償、違約金、解除契約", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講列社維法六種處罰：拘留、勒令歇業、停止營業、罰鍰、沒入、申誡。", "topic": "六種處罰辨識", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "因拘留涉及人身自由，依第01講，應由何者裁定？", "option_a": "法院裁定", "option_b": "警察單方最終裁定", "option_c": "營業負責人裁定", "option_d": "法定代理人裁定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出涉及人身自由的拘留由法院裁定。", "topic": "拘留歸屬", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "勒令歇業、停止營業涉及營業自由。依第01講，應由何者裁定？", "option_a": "法院裁定", "option_b": "警察處分即可", "option_c": "監護人裁定", "option_d": "被害人自行裁定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出涉及營業自由的勒令歇業、停止營業，由法院裁定。", "topic": "營業自由裁定", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "某違序行為僅處罰鍰、沒入、申誡。依第01講，原則上由何者處分？", "option_a": "警察機關", "option_b": "最高法院", "option_c": "軍事法院", "option_d": "民間調解委員會", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出罰鍰、沒入、申誡屬警察處分。", "topic": "警察處分範圍", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "第01講所稱司法與行政雙軌裁處，最精準的理解為何？", "option_a": "重大自由限制由法院裁定，罰鍰、沒入、申誡由警察處分", "option_b": "所有案件都由警察拘留", "option_c": "所有案件都由法院刑事判決", "option_d": "所有案件都由軍法裁定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出涉及人身自由及營業自由者由法院裁定，罰鍰、沒入、申誡由警察處分。", "topic": "雙軌裁處架構", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "未成年人違反社維法，法定代理人或監護人有疏於管教情形。依第01講，可能連結何制度？", "option_a": "§10責任轉嫁制度", "option_b": "§18兩罰制度", "option_c": "釋字666制度", "option_d": "刑事優先制度", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出§10為責任轉嫁制度，對疏於管教之法定代理人或監護人施以處罰。", "topic": "§10責任轉嫁", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "某營業場所中行為人違反社維法，主管機關除處罰行為人外，也處罰營業負責人。依第01講，這較接近何制度？", "option_a": "§18兩罰制度", "option_b": "§10責任轉嫁制度", "option_c": "釋字251制度", "option_d": "軍人適用原則", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出§18兩罰制度除處罰行為人外，亦得處罰營業負責人。", "topic": "§18兩罰", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "§10與§18的共同特色較接近何者？", "option_a": "都不是只看直接行為人，而有責任擴張或管理責任設計", "option_b": "都完全免除行為人責任", "option_c": "都只處罰法院人員", "option_d": "都只處理刑事重罪", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講說明§10是責任轉嫁，§18是兩罰制度，均呈現行政責任擴張或管理責任強化。", "topic": "責任擴張比較", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "現役軍人違反社維法，主張只能由軍法裁定。依第01講，何者正確？", "option_a": "由警察或司法機關裁處，不再適用軍法裁定", "option_b": "一律由軍法機關裁定", "option_c": "一律免罰", "option_d": "只能由部隊長口頭警告", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出現役軍人違反本法，由警察或司法機關裁處，不再適用軍法裁定，符合法律公平性。", "topic": "軍人適用平等", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "一行為同時觸犯刑法與社維法，若先用社維法輕罰結案，可能規避刑法重罰。依第01講，應採何原則？", "option_a": "刑事優先原則", "option_b": "民事優先原則", "option_c": "軍法優先原則", "option_d": "契約自由原則", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出一行為同時觸犯刑事法令及本法者，原則由刑事案件先行處理，以防止規避重法。", "topic": "刑事優先避免規避重法", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "第01講提醒社維法與刑法界限，實務常連結行政罰法§24。這主要涉及何原則？", "option_a": "一行為不二罰原則", "option_b": "誠實信用原則", "option_c": "物權法定原則", "option_d": "公司資本維持原則", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出本法與刑法界限常涉及一行為不二罰原則，並連結行政罰法§24。", "topic": "一行為不二罰連結", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "社維法裁處可能有警察機關行政處分與法院司法裁定。依第01講，救濟程序應注意何者？", "option_a": "不同裁處性質可能對應不同救濟，如訴願/行政訴訟理論與本法聲明異議", "option_b": "所有案件都只可民事起訴", "option_c": "所有案件都只能刑事上訴", "option_d": "完全不得救濟", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出本法裁處性質可能為行政處分或司法裁定，救濟分別連結訴願/行政訴訟理論與本法聲明異議程序。", "topic": "救濟路線", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}, {"id": "SOMA01B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "若國考問社維法演進的憲法核心，依第01講最應抓哪三個？", "option_a": "人身自由、正當法律程序、平等原則", "option_b": "契約自由、營業秘密、公司自治", "option_c": "親屬扶養、繼承順位、婚姻無效", "option_d": "物權法定、占有保護、抵押權", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第01講指出人身自由、正當法律程序、平等原則在社維法演進中具關鍵地位。", "topic": "憲法考點總結", "source": "Notion：社會秩序維護法 / 第01講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
