const questions = [{"id": "SOMA11B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "第11講第二套若用考點濃縮，最核心的組合是什麼？", "option_a": "§5-1用語計算、§6書面/口頭處分、§64聚眾、§85妨害公務、§7故意過失", "option_b": "性交易專區與§80/§81", "option_c": "噪音干擾與強制罪", "option_d": "罰鍰分期與易以拘留", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講主軸包含法律用語明確性與計算、書面主義與緊急處分、聚眾與妨害公務實務爭點、故意過失責任。", "topic": "第11講核心", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，『以上、以下、以內』如何計算？", "option_a": "俱連本數計算", "option_b": "一律不含本數", "option_c": "只有以上含本數", "option_d": "只有以下含本數", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出『以上、以下、以內』俱連本數計算。", "topic": "以上以下以內", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，『以上』之意義為何？", "option_a": "指該最少數，即起點", "option_b": "指該最多數，即終點", "option_c": "指兩數之間且不含端點", "option_d": "完全不含本數", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出『以上』指該最少數，也就是起點。", "topic": "以上定義", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，『以下』之意義為何？", "option_a": "指該最多數，即終點", "option_b": "指該最少數，即起點", "option_c": "只指中間數", "option_d": "完全不含終點", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出『以下』指該最多數，也就是終點。", "topic": "以下定義", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，『以內』之意義為何？", "option_a": "指最少數與最多數之間，含端點", "option_b": "只指超過最大數", "option_c": "只指小於最少數", "option_d": "完全不含端點", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出『以內』指最少數與最多數之間，並含端點。", "topic": "以內定義", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "社維法拘留『1日以上3日以下』，依第11講，下列何者在範圍內？", "option_a": "1日、2日、3日均在範圍內", "option_b": "只有2日", "option_c": "只有1日", "option_d": "只有3日以上不含3日", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講實務應用指出拘留1日以上3日以下，包含1日與3日，裁定2日亦在範圍內。", "topic": "拘留範圍", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "第11講將『以上、以下、以內』俱連本數，連結何種行政法原則？", "option_a": "法律明確性原則", "option_b": "契約自由原則", "option_c": "物權法定原則", "option_d": "公司自治原則", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出此計算符合行政法之法律明確性原則。", "topic": "法律明確性", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，解散命令、檢查命令、禁止、勸導等處分原則上應如何？", "option_a": "以書面為之", "option_b": "一律只能口頭", "option_c": "一律不用表示", "option_d": "只能用社群貼文", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出§6原則為書面主義，解散命令、檢查命令、禁止、勸導等處分應以書面為之。", "topic": "書面主義原則", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，何種情形下得以口頭為處分？", "option_a": "情況緊急時", "option_b": "任何平常情況均可口頭且不用理由", "option_c": "只有民眾要求時", "option_d": "只有處分無效時", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出情況緊急時得以口頭為之，具備行政處分彈性。", "topic": "口頭處分例外", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，解散命令在行政法上屬於何種性質？", "option_a": "對人之一般處分", "option_b": "契約行為", "option_c": "民事判決", "option_d": "刑事起訴", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出解散命令之性質為對人之一般處分。", "topic": "解散命令性質", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，§6解散、檢查、禁止、勸導等命令之權限主體為何？", "option_a": "警察機關或該管公務員", "option_b": "任何路人均可作成行政處分", "option_c": "民間公司董事會", "option_d": "被害人單方裁定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出權限主體為警察機關或該管公務員。", "topic": "§6權限主體", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，若民眾權益受侵害，亦可先行為何？", "option_a": "口頭勸阻", "option_b": "直接作成行政處分", "option_c": "直接拘留對方", "option_d": "直接勒令歇業", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出若民眾權益受侵害，亦可先行口頭勸阻。", "topic": "民眾口頭勸阻", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，任意聚眾§64-1-1的要件不包括下列何者？", "option_a": "必須實際發生重大暴力結果", "option_b": "意圖滋事", "option_c": "聚眾狀態", "option_d": "受解散命令而不解散", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出任意聚眾要件包含意圖滋事、聚眾定義、解散命令不從；意圖滋事不以實際發生為必要。", "topic": "§64任意聚眾要件", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，§64所稱意圖滋事是指何者？", "option_a": "原始動機即想生事端，不以實際發生為必要", "option_b": "一定要已經造成重大傷亡", "option_c": "只是純粹路過", "option_d": "只有合法陳情才算", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出意圖滋事為原始動機即想生事端，不以實際發生為必要。", "topic": "意圖滋事", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，聚眾定義重點為何？", "option_a": "人數可隨時增加之狀態", "option_b": "一定剛好三人且不能增加", "option_c": "一定要一百人以上", "option_d": "只有兩人私下聊天", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出聚眾定義為人數可隨時增加之狀態。", "topic": "聚眾定義", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，判斷聚眾時，偵訊上需確認何事？", "option_a": "是否有後援或社群號召", "option_b": "是否有公司章程", "option_c": "是否有遺囑", "option_d": "是否有房屋稅單", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講提醒需注意偵訊技巧，確認是否有後援或社群號召。", "topic": "偵訊技巧", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，§64中解散命令不從是指受何者命令而不解散？", "option_a": "該管公務員或警察之解散命令", "option_b": "民間路人隨便 ": "第11講指出社維法不同於刑法原則罰故意、例外罰過失。", "topic": "刑法比較", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "依第11講，社維法過失犯有何特別保障？", "option_a": "不得處拘留，得減輕處罰", "option_b": "一定拘留且不得減輕", "option_c": "一定勒令歇業", "option_d": "一定刑事起訴", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出過失犯不得處拘留，且得減輕處罰。", "topic": "過失犯保障", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "甲預見結果發生，且發生不違背其本意。依第11講，這是何者？", "option_a": "間接故意", "option_b": "直接故意", "option_c": "有認識過失", "option_d": "無認識過失", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出間接故意為預見其發生，且發生不違背其本意。", "topic": "故意過失區分", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}, {"id": "SOMA11B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "甲預見可能發生結果，但確信其不發生，例如自認技術好丟石頭卻打破路燈。依第11講，這是何者？", "option_a": "有認識過失", "option_b": "直接故意", "option_c": "間接故意", "option_d": "無認識過失", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第11講指出有認識過失為預見其發生，但確信其不發生，例自認技術好丟石頭打破路燈。", "topic": "有認識過失", "source": "Notion：社會秩序維護法 / 第11講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
